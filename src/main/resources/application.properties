spring.application.name=crudApplicationDemo

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/crud_demo_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=crud_user
spring.datasource.password=crud1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
